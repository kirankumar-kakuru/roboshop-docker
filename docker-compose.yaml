services:
  catalogue:
    build: ./catalogue
    image: kiran535/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build: ./user
    image: kiran535/user:1.0.1
    container_name: user
    depends_on:
    - redis
    - mongodb
  cart:
    build: ./cart
    image: kiran535/cart:1.0.0
    container_name: cart
    depends_on:
    - redis
    - mongodb
  frontend:
    build: ./frontend
    image: kiran535/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    # - shipping
    # - payment
  mongodb:
    build: ./mongodb # it moves to mongodb directory
    image: kiran535/mongodb:1.0.0 # docker build -t joindevops/mongodb:1.0.0
    container_name: mongodb
    volumes:
    - mongodb:/data/db
  redis:
    image: redis:7.0
    container_name: redis
  mysql:
    build: ./mysql
    image: kiran535/mysql:1.0.0
    container_name: mysql
    volumes:
    - mysql:/var/lib/mysql
