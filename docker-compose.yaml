services:
  catalogue:
    build: ./catalogue
    image: kiran535/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  mongodb:
    build: ./mongodb # it moves to mongodb directory
    image: kiran535/mongodb:1.0.0 # docker build -t joindevops/mongodb:1.0.0
    container_name: mongodb
    volumes:
    - mongodb:/data/db

